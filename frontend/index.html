    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; box-sizing: border-box; }
    body {

      background: #0a0a0b;
      color: #fafafa;
      overflow-x: hidden;
    }
    
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .glass-hover:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.12);
    }
    
    .gradient-text {
      background: linear-gradient(135deg, #22c55e 0%, #4ade80 50%, #86efac 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .gradient-border {
      position: relative;
      background: #0a0a0b;
    }
    .gradient-border::before {
      content: '';
      position: absolute;
      inset: 0;
      padding: 1px;
      border-radius: inherit;
      background: linear-gradient(135deg, #22c55e, #86efac, #22c55e);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    
    .prob-bar-bg {
      background: rgba(255,255,255,0.06);
    }
    
    .glow-green {
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.25);
    }
    
    .scrollbar-thin::-webkit-scrollbar { width: 4px; height: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    
    .tab-active {
      color: #22c55e;
      border-bottom: 2px solid #22c55e;
    }
    
    .modal-backdrop {
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-up { animation: slideUp 0.25s ease-out; }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fade-in { animation: fadeIn 0.2s ease-out; }
    
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 10px;
      font-weight: 600;
      line-height: 1.5;
    }
    
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
      background-size: 200% 100%;
      animation: skeleton 1.5s ease-in-out infinite;
    }
    @keyframes skeleton {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    /* 移动端底部导航 */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10, 10, 11, 0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 40;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    
    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
      font-size: 10px;
      gap: 2px;
      transition: all 0.2s;
    }
    
    .bottom-nav-item.active {
      color: #22c55e;
    }
    
    .bottom-nav-icon {
      font-size: 20px;
      line-height: 1;
    }
    
    /* 移动端安全区域 */
    .pb-safe { padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px)); }
    
    @media (min-width: 768px) {
      .bottom-nav { display: none; }
      .pb-safe { padding-bottom: 0; }
    }
    
    /* 隐藏滚动条但保留功能 */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      animation: slideDown 0.3s ease-out;
    }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>

    // ==================== 工具函数 ====================
    function toast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const colors = {
        info: 'bg-white/10 text-white border border-white/20',
        success: 'bg-edge-500/20 text-edge-300 border border-edge-500/30',
        error: 'bg-red-500/20 text-red-300 border border-red-500/30'
      };
      
      const el = document.createElement('div');
      el.className = `toast ${colors[type]} backdrop-blur-xl`;
      el.textContent = message;
      container.appendChild(el);
      
      setTimeout(() => {
        el.style.opacity = '0';
        el.style.transition = 'opacity 0.3s';
        setTimeout(() => el.remove(), 300);
      }, 2500);
    }

    async function api(endpoint, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...options.headers };
      if (state.token) {
        headers['Authorization'] = `Bearer ${state.token}`;
      }
      
      try {
        const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
        if (res.status === 401) {
          state.token = null;
          state.user = null;
          localStorage.removeItem('predictedge_token');
          render();
          throw new Error(t('toast.needLogin'));
        }
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || t('toast.requestFailed'));
        }
        return await res.json();
      } catch (e) {
        console.error('API Error:', e);
        throw e;
      }
    }

    function formatNumber(num) {
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(0) + 'K';
      return num.toString();
    }

    function formatTimeLeft(deadline) {
      const now = new Date();
      const end = new Date(deadline);
      const diff = end - now;
      
      if (diff <= 0) return t('time.ended');
      
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      
      if (days > 0) return `${days}${t('time.days')}${hours}${t('time.hours')}`;
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      if (hours > 0) return `${hours}${t('time.hours')}${minutes}${t('time.minutes')}`;
      return `${minutes}${t('time.minutes')}`;
    }

    function formatTimeAgo(timestamp) {
      const now = new Date();
      const then = new Date(timestamp);
      const diff = now - then;
      
      const minutes = Math.floor(diff / 60000);
      if (minutes < 1) return t('time.just');
      if (minutes < 60) return `${minutes}${t('time.minutes')}${t('time.ago')}`;
      
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}${t('time.hours')}${t('time.ago')}`;
      
      const days = Math.floor(hours / 24);
      return `${days}${t('time.days')}${t('time.ago')}`;
    }

      const username = form.username.value.trim();

        toast(t('toast.fillLoginFields'), 'error');

      try {
        const data = await api('/auth/login', {

        state.token = data.access_token;
        state.user = data.user;
        localStorage.setItem('predictedge_token', state.token);
        state.showAuthModal = false;
        toast(t('toast.loginSuccess'), 'success');
        await Promise.all([loadAlerts(), loadArbitrageData()]);

      } catch (e) {

    // ==================== 分析引擎（前端） ====================
    function analyzeEvent(event) {
      const prob = event.probability;
      const category = event.category;
      const change = event.change || 0;
      const volume = event.volume || 0;
      
      const accuracyMap = {
        weather: 0.72, crypto: 0.55, sports: 0.68, politics: 0.62, other: 0.50
      };
      const historicalAccuracy = accuracyMap[category] || 0.50;
      
      const factors = [];
      let totalWeight = 0;
      
      // Factor 1: Extreme Probability Mean Reversion (30%)
      if (prob > 85) {
        factors.push({ adj: prob * 0.88, weight: 0.30, reason: t('analysis.reason.extremeHigh') });
      } else if (prob < 15) {
        factors.push({ adj: prob * 1.25, weight: 0.30, reason: t('analysis.reason.extremeLow') });
      } else if (prob > 75) {
        factors.push({ adj: prob * 0.94, weight: 0.20, reason: t('analysis.reason.high') });
      } else if (prob < 25) {
        factors.push({ adj: prob * 1.15, weight: 0.20, reason: t('analysis.reason.low') });
      } else {
        factors.push({ adj: prob, weight: 0.15, reason: t('analysis.reason.medium') });
      }
      totalWeight += factors[factors.length - 1].weight;
      
      // Factor 2: Momentum Effect (20%)
      if (change > 10) {
        factors.push({ adj: Math.min(99, prob * 1.08), weight: 0.20, reason: t('analysis.reason.momentumUpStrong') });
      } else if (change > 5) {
        factors.push({ adj: Math.min(99, prob * 1.04), weight: 0.15, reason: t('analysis.reason.momentumUp') });
      } else if (change < -10) {
        factors.push({ adj: Math.max(1, prob * 0.92), weight: 0.20, reason: t('analysis.reason.momentumDownStrong') });
      } else if (change < -5) {
        factors.push({ adj: Math.max(1, prob * 0.96), weight: 0.15, reason: t('analysis.reason.momentumDown') });
      } else {
        factors.push({ adj: prob, weight: 0.10, reason: t('analysis.reason.momentumFlat') });
      }
      totalWeight += factors[factors.length - 1].weight;
      
      // Factor 3: Category Historical Bias (25%)
      const categoryBias = {
        weather:  { low: 1.12, high: 0.95, tLow: 60, tHigh: 70 },
        crypto:   { low: 1.08, high: 0.88, tLow: 40, tHigh: 65 },
        sports:   { low: 1.18, high: 0.93, tLow: 35, tHigh: 65 },
        politics: { low: 1.10, high: 0.85, tLow: 45, tHigh: 60 },
        other:    { low: 1.05, high: 0.95, tLow: 40, tHigh: 60 }
      };
      const cb = categoryBias[category] || categoryBias.other;
      const catLabel = getCategoryLabel(category);
      if (prob < cb.tLow) {
        factors.push({ adj: prob * cb.low, weight: 0.25, reason: t('analysis.reason.catLow', { cat: catLabel }) });
      } else if (prob > cb.tHigh) {
        factors.push({ adj: prob * cb.high, weight: 0.25, reason: t('analysis.reason.catHigh', { cat: catLabel }) });
      } else {
        factors.push({ adj: prob, weight: 0.15, reason: t('analysis.reason.catMedium') });
      }
      totalWeight += factors[factors.length - 1].weight;
      
      // Factor 4: Volume Verification (15%)
      if (volume > 1000000) {
        if (prob > 60) {
          factors.push({ adj: prob * 0.97, weight: 0.15, reason: t('analysis.reason.volHighHigh') });
        } else if (prob < 40) {
          factors.push({ adj: prob * 1.05, weight: 0.15, reason: t('analysis.reason.volHighLow') });
        } else {
          factors.push({ adj: prob, weight: 0.10, reason: t('analysis.reason.volHighMed') });
        }
      } else if (volume > 100000) {
        factors.push({ adj: prob, weight: 0.08, reason: t('analysis.reason.volMed') });
      } else {
        if (prob > 70) {
          factors.push({ adj: prob * 0.90, weight: 0.20, reason: t('analysis.reason.volLowHigh') });
        } else if (prob < 30) {
          factors.push({ adj: prob * 1.15, weight: 0.20, reason: t('analysis.reason.volLowLow') });
        } else {
          factors.push({ adj: prob, weight: 0.12, reason: t('analysis.reason.volLowMed') });
        }
      }
      totalWeight += factors[factors.length - 1].weight;
      
      // Factor 5: Time Decay (10%)
      try {
        const deadline = new Date(event.deadline);
        const daysLeft = (deadline - new Date()) / 86400000;
        if (daysLeft < 1) {
          if (prob > 70) {
            factors.push({ adj: prob * 0.95, weight: 0.10, reason: t('analysis.reason.timeNearHigh') });
          } else if (prob < 30) {
            factors.push({ adj: prob * 1.08, weight: 0.10, reason: t('analysis.reason.timeNearLow') });
          } else {
            factors.push({ adj: prob, weight: 0.05, reason: t('analysis.reason.timeNearMed') });
          }
        } else if (daysLeft < 7) {
          factors.push({ adj: prob, weight: 0.08, reason: t('analysis.reason.timeWeek') });
        } else if (daysLeft > 90) {
          if (prob > 60) {
            factors.push({ adj: prob * 0.93, weight: 0.12, reason: t('analysis.reason.timeFarHigh') });
          } else if (prob < 40) {
            factors.push({ adj: prob * 1.10, weight: 0.12, reason: t('analysis.reason.timeFarLow') });
          } else {
            factors.push({ adj: prob, weight: 0.08, reason: t('analysis.reason.timeFarMed') });
          }
        } else {
          factors.push({ adj: prob, weight: 0.06, reason: t('analysis.reason.timeMid') });
        }
      } catch (e) {
        factors.push({ adj: prob, weight: 0.05, reason: t('analysis.reason.timeUnknown') });
      }
      totalWeight += factors[factors.length - 1].weight;
      
      // 加权平均
      const weightedSum = factors.reduce((sum, f) => sum + f.adj * f.weight, 0);
      let predicted = weightedSum / totalWeight;
      predicted = Math.max(1.0, Math.min(99.0, predicted));
      
      const deviation = Math.round((prob - predicted) * 10) / 10;
      
      // 建议
      let recommendation;
      if (deviation > 8) recommendation = 'buy_no';
      else if (deviation < -8) recommendation = 'buy_yes';
      else if (deviation > 3) recommendation = 'lean_no';
      else if (deviation < -3) recommendation = 'lean_yes';
      else recommendation = 'hold';
      
      // 最主要原因
      const mainReason = factors.reduce((a, b) => 
        (Math.abs(a.adj - prob) * a.weight) > (Math.abs(b.adj - prob) * b.weight) ? a : b
      );
      
      // 置信度
      const confBase = historicalAccuracy * 100;
      const volBonus = Math.min(15, volume / 100000);
      const devBonus = Math.min(10, Math.abs(deviation));
      const confidence = Math.min(95, Math.max(30, Math.round(confBase + volBonus + devBonus)));
      
      // 预期收益
      const rrRatio = category === 'weather' || category === 'sports' ? 1.5 : 2.0;
      const expectedProfit = Math.abs(deviation) < 2 ? 0 : Math.max(1.0, Math.abs(deviation) * rrRatio);
      
      return {
        event_id: event.id,
        predicted_probability: Math.round(predicted * 10) / 10,
        market_probability: prob,
        deviation: deviation,
        confidence: confidence,
        recommendation: recommendation,
        reasoning: mainReason.reason,
        expected_profit: Math.round(expectedProfit * 10) / 10,
        factors_count: factors.length
      };
    }

    function getArbitrageOpportunities() {
      return state.events
        .map(e => ({ event: e, analysis: analyzeEvent(e) }))
        .filter(o => {
          const rec = o.analysis.recommendation;
          return rec !== 'hold' && Math.abs(o.analysis.deviation) >= 2;
        })
        .sort((a, b) => {
          const sa = Math.abs(a.analysis.deviation) * 8 + a.analysis.confidence * 0.3;
          const sb = Math.abs(b.analysis.deviation) * 8 + b.analysis.confidence * 0.3;
          return sb - sa;
        });
    }

    function copyToClipboard(text) {

      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);

    async function createOrder() {
      if (!state.user) return;
      try {
        const order = await api('/subscription/create-order', {
          method: 'POST',
          body: JSON.stringify({ tier: state.selectedTier, payment_method: 'usdt' })
        });
        state.currentOrder = order;
        startOrderPolling(order.order_id);
        toast(t('toast.orderCreated'), 'success');
        render();
      } catch (e) {
        toast(e.message || t('toast.orderFailed'), 'error');
      }
    }

    function startOrderPolling(orderId) {
      if (state.orderPollingTimer) {
        clearInterval(state.orderPollingTimer);
      }
      
      state.orderPollingTimer = setInterval(async () => {
        try {
          const order = await api(`/orders/${orderId}`);
          state.currentOrder = order;
          
          if (order.status === 'paid' || order.status === 'completed') {
            clearInterval(state.orderPollingTimer);
            state.orderPollingTimer = null;
            toast(t('toast.paymentSuccess'), 'success');
            if (state.user) {
              state.user.subscription_tier = order.tier;
              state.user.subscription_name = order.tier_name;
              localStorage.setItem('predictedge_user', JSON.stringify(state.user));
            }
            setTimeout(() => {
              closePaymentModal();
            }, 2000);
          }
          render();
        } catch (e) {
          console.warn('轮询订单状态失败', e);
        }
      }, 10000);
    }

    function closePaymentModal() {
      state.showPaymentModal = false;
      if (state.orderPollingTimer) {
        clearInterval(state.orderPollingTimer);
        state.orderPollingTimer = null;
      }
      state.currentOrder = null;
      document.body.style.overflow = '';
      render();
    }

    async function submitTxHash() {
      if (!state.currentOrder) return;
      
      const txHash = prompt('请输入您的交易哈希 (TxHash)：');
      if (!txHash || txHash.trim().length < 10) {
        toast(t('toast.invalidTxHash'), 'error');
        return;
      }
      
      try {
        const result = await api(`/orders/${state.currentOrder.order_id}/submit_tx`, {
          method: 'POST',
          body: JSON.stringify({ tx_hash: txHash.trim() })
        });
        toast(result.message || t('toast.txSubmitted'), 'success');
        state.currentOrder.status = 'pending_manual';
        render();
      } catch (e) {
        toast(e.message || t('toast.submitFailed'), 'error');
      }
    }

    function renderEventModal() {

      const isPro = state.user && (state.user.subscription_tier === 'pro' || state.user.subscription_tier === 'agency');

      return `
        <div class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 modal-backdrop animate-fade-in" onclick="if(event.target===this)closeEventModal()">

                <div class="text-center mb-4">
                  <div class="text-4xl sm:text-5xl font-bold font-mono ${event.probability > 50 ? 'text-edge-400' : 'text-red-400'}">

                    class="h-full rounded-full transition-all duration-500 ${event.probability > 50 ? 'bg-gradient-to-r from-edge-600 to-edge-400' : 'bg-gradient-to-r from-red-600 to-red-400'}"
                    style="width: ${event.probability}%"

                </div>
                
                <div class="flex justify-between text-[10px] sm:text-xs text-white/40">
                  <span>No 0%</span>
                  <span>Yes 100%</span>
                </div>
              </div>
              
              <!-- 关键数据 -->
              <div class="grid grid-cols-3 gap-2 sm:gap-3 mb-5 sm:mb-6">
                <div class="bg-white/5 rounded-xl p-3 sm:p-4 text-center">
                  <div class="font-bold text-sm sm:text-base">$${formatNumber(event.volume)}</div>
                  <div class="text-[10px] sm:text-xs text-white/40 mt-1">${t('common.volume')}</div>
                </div>
                <div class="bg-white/5 rounded-xl p-3 sm:p-4 text-center">
                  <div class="font-bold text-sm sm:text-base">${formatTimeLeft(event.deadline)}</div>
                  <div class="text-[10px] sm:text-xs text-white/40 mt-1">${t('common.timeLeft')}</div>
                </div>
                <div class="bg-white/5 rounded-xl p-3 sm:p-4 text-center">
                  <div class="font-bold text-sm sm:text-base ${event.change > 0 ? 'text-edge-400' : 'text-red-400'}">
                    ${event.change > 0 ? '+' : ''}${event.change}%
                  </div>
                  <div class="text-[10px] sm:text-xs text-white/40 mt-1">${t('common.change24h')}</div>
                </div>
              </div>
              
              <!-- AI分析 -->
              <div class="bg-edge-500/5 border border-edge-500/20 rounded-2xl p-4 sm:p-6 relative overflow-hidden">
                <div class="flex items-center gap-2 mb-3 sm:mb-4">
                  <span class="text-lg sm:text-xl">🤖</span>
                  <span class="font-semibold text-sm sm:text-base">${t('ai.title')}</span>
                </div>
                
                ${unlocked ? `
                <!-- 解锁状态：完整显示 -->
                <div class="grid grid-cols-2 gap-3 sm:gap-4 mb-3 sm:mb-4">
                  <div>
                    <div class="text-[10px] sm:text-xs text-white/40 mb-1">${t('ai.predicted')}</div>
                    <div class="text-xl sm:text-2xl font-bold text-edge-400">${analysis.predicted_probability}%</div>
                  </div>
                  <div>
                    <div class="text-[10px] sm:text-xs text-white/40 mb-1">${t('ai.deviation')}</div>
                    <div class="text-xl sm:text-2xl font-bold ${analysis.deviation > 0 ? 'text-edge-400' : 'text-red-400'}">
                      ${analysis.deviation > 0 ? '+' : ''}${analysis.deviation}%
                    </div>
                  </div>
                </div>
                
                <div class="bg-white/5 rounded-xl p-3 sm:p-4 mb-3 sm:mb-4">
                  <div class="text-xs sm:text-sm text-white/70 leading-relaxed">${analysis.reasoning}</div>
                </div>
                
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                  <div class="text-xs sm:text-sm">
                    <span class="text-white/40">${t('ai.confidence')}：</span>
                    <span class="font-semibold text-amber-400">${analysis.confidence}%</span>
                    <span class="mx-2 text-white/20">|</span>
                    <span class="text-white/40">${t('ai.expectedProfit')}：</span>
                    <span class="font-semibold text-edge-400">+${analysis.expected_profit.toFixed(1)}%</span>
                  </div>
                  <span class="px-4 py-2 rounded-xl text-xs sm:text-sm font-bold w-full sm:w-auto text-center ${
                    rec === 'buy_yes' 
                      ? 'bg-edge-500 text-black' 
                      : rec === 'buy_no'
                        ? 'bg-red-500 text-white'
                        : 'bg-white/10 text-white/60'
                  }">
                    ${rec === 'buy_yes' ? t('ai.buyYes') : rec === 'buy_no' ? t('ai.buyNo') : t('ai.hold')}
                  </span>
                </div>
                ` : `
                <!-- 锁定状态：模糊显示 + 解锁按钮 -->
                <div class="grid grid-cols-2 gap-3 sm:gap-4 mb-3 sm:mb-4">
                  <div>
                    <div class="text-[10px] sm:text-xs text-white/40 mb-1">${t('ai.predicted')}</div>
                    <div class="text-xl sm:text-2xl font-bold text-edge-400 blur-md select-none">??%</div>
                  </div>
                  <div>
                    <div class="text-[10px] sm:text-xs text-white/40 mb-1">${t('ai.deviation')}</div>
                    <div class="text-xl sm:text-2xl font-bold text-edge-400 blur-md select-none">??%</div>
                  </div>
                </div>
                
                <div class="bg-white/5 rounded-xl p-3 sm:p-4 mb-3 sm:mb-4">
                  <div class="text-xs sm:text-sm text-white/70 leading-relaxed blur-md select-none h-10 overflow-hidden">
                    ${t('ai.locked')}
                  </div>
                </div>
                
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4">
                  <div class="text-xs sm:text-sm blur-md select-none">
                    <span class="text-white/40">${t('ai.confidence')}：</span>
                    <span class="font-semibold">??%</span>
                  </div>
                  <span class="px-4 py-2 rounded-xl text-xs sm:text-sm font-bold w-full sm:w-auto text-center bg-white/10 text-white/30 blur-sm select-none">
                    ${t('ai.recommendation')} ???
                  </span>
                </div>
                
                <!-- 解锁按钮区域 -->
                <div class="border-t border-white/5 pt-4 mt-2">
                  ${state.user ? `
                    ${remaining > 0 ? `
                      <button onclick="unlockEvent('${event.id}')" class="w-full py-3 bg-edge-500 hover:bg-edge-400 text-black font-semibold rounded-xl transition-all text-sm">
                        ${t('ai.unlockBtn')}
                      </button>
                      <p class="text-[10px] text-white/30 text-center mt-2">
                        ${t('ai.freeLimit')} · <span class="text-edge-400 cursor-pointer hover:underline" onclick="closeEventModal();document.getElementById('pricing').scrollIntoView({behavior:'smooth'})">${t('ai.upgradeBtn')}</span>
                      </p>
                    ` : `
                      <button onclick="closeEventModal();document.getElementById('pricing').scrollIntoView({behavior:'smooth'})" class="w-full py-3 bg-amber-500 hover:bg-amber-400 text-black font-semibold rounded-xl transition-all text-sm">
                        ${t('ai.noMoreUnlocks')}
                      </button>
                      <p class="text-[10px] text-white/30 text-center mt-2">
                        ${t('ai.proUnlimited')}
                      </p>
                    `}
                  ` : `
                    <button onclick="state.authMode='register';state.showAuthModal=true;closeEventModal()" class="w-full py-3 bg-edge-500 hover:bg-edge-400 text-black font-semibold rounded-xl transition-all text-sm">
                      ${t('ai.registerUnlock')}
                    </button>
                    <p class="text-[10px] text-white/30 text-center mt-2">
                      ${t('ai.registerFree')}
                    </p>
                  `}
                </div>
                `}
              </div>
              
              <button 
                onclick="window.open('https://polymarket.com', '_blank')"
                class="w-full mt-5 sm:mt-6 py-2.5 sm:py-3 bg-white/5 hover:bg-white/10 text-white font-medium rounded-xl transition-all flex items-center justify-center gap-2 text-sm"
              >
                <span>${t('ai.goTrade')}</span>
                <span>↗</span>
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function renderFooter() {
      return `
        <footer class="border-t border-white/5 py-8 sm:py-12">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-5 sm:gap-6">
              <div class="flex items-center gap-2.5">
                <div class="w-7 h-7 sm:w-8 sm:h-8 rounded-lg bg-gradient-to-br from-edge-400 to-edge-600 flex items-center justify-center font-bold text-black text-xs sm:text-sm">
                  PE
                </div>
                <div>
                  <div class="font-semibold text-xs sm:text-sm">PredictEdge</div>
                  <div class="text-[9px] sm:text-[10px] text-white/40">AI Prediction Markets</div>
                </div>
              </div>
              
              <div class="flex items-center gap-5 sm:gap-6 text-xs sm:text-sm text-white/40">
                <a href="#" class="hover:text-white/60 transition-colors">${t('footer.about')}</a>
                <a href="#" class="hover:text-white/60 transition-colors">${t('footer.terms')}</a>
                <a href="#" class="hover:text-white/60 transition-colors">${t('footer.privacy')}</a>
                <a href="#" class="hover:text-white/60 transition-colors">${t('footer.contact')}</a>
              </div>
            </div>
            
            <div class="mt-6 sm:mt-8 pt-5 sm:pt-6 border-t border-white/5 text-center text-[10px] sm:text-xs text-white/30">
              ${t('footer.copyright')}
            </div>
          </div>
        </footer>
      `;
    }

    function renderBottomNav() {
      const items = [
        { id: 'markets', label: t('tab.markets') },
        { id: 'alerts', label: t('tab.alerts') },
        { id: 'analysis', label: t('tab.analysis') },
        { id: 'arbitrage', label: t('tab.arbitrage') },
        { id: 'profile', label: t('tab.profile') },
      ];
      
      return `
        <nav class="bottom-nav md:hidden">
          <div class="flex items-center justify-around">
            ${items.map(item => `
              <button 
                onclick="handleBottomNav('${item.id}')"
                class="bottom-nav-item flex-1 ${state.currentTab === item.id ? 'active' : 'text-white/40'}"
              >
                <span>${item.label}</span>
              </button>
            `).join('')}
          </div>
        </nav>
      `;
    }

    // ==================== 事件处理 ====================
    function switchTab(tabId) {
      state.currentTab = tabId;
      state.searchQuery = '';
      
      if (tabId === 'alerts' && state.user && state.alerts.length === 0) {
        loadAlerts();
      }
      
      render();
      setTimeout(() => {
        const mainSection = document.getElementById('markets-section');
        if (mainSection) {
          mainSection.scrollIntoView({ behavior: 'smooth' });
        }
      }, 100);
    }

    function switchCategory(catId) {
      state.currentCategory = catId;
      loadData();
    }

    function handleSearch(e) {
      state.searchQuery = e.target.value;
      if (state.searchQuery.length > 0 || state.searchQuery.length === 0) {
        loadData();
      }
    }

    function isEventUnlocked(eventId) {
      if (!state.user) return false;
      if (state.user.subscription_tier === 'pro' || state.user.subscription_tier === 'agency') return true;
      return state.unlockedEvents.includes(eventId);
    }

    function getRemainingUnlocks() {
      if (!state.user) return state.dailyUnlockLimit;
      if (state.user.subscription_tier === 'pro' || state.user.subscription_tier === 'agency') return 999;
      const limit = state.user.daily_events_limit || state.dailyUnlockLimit;
      const viewed = state.user.daily_events_viewed || 0;
      return Math.max(0, limit - viewed);
    }

    async function unlockEvent(eventId) {
      if (isEventUnlocked(eventId)) return true;
      if (!state.user) {
        state.showAuthModal = true;
        state.authMode = 'register';
        render();
        return false;
      }
      if (state.user.subscription_tier === 'pro' || state.user.subscription_tier === 'agency') return true;
      
      const remaining = getRemainingUnlocks();
      if (remaining <= 0) {
        toast(t('toast.freeUnlocksUsed'), 'warning');
        state.selectedEvent = null;
        document.body.style.overflow = '';
        render();
        setTimeout(() => {
          document.getElementById('pricing')?.scrollIntoView({behavior: 'smooth'});
        }, 100);
        return false;
      }
      
      try {
        const eventDetail = await api(`/events/${eventId}`);
        state.unlockedEvents.push(eventId);
        if (state.user) {
          state.user.daily_events_viewed = (state.user.daily_events_viewed || 0) + 1;
        }
        toast(t('toast.unlockSuccess', { n: getRemainingUnlocks() }), 'success');
        render();
        return true;
      } catch (e) {
        if (e.message && e.message.includes('今日查看次数已用完')) {
          toast(t('toast.freeUnlocksUsed'), 'warning');
          if (state.user) {
            state.user.daily_events_viewed = state.user.daily_events_limit || state.dailyUnlockLimit;
          }
          state.selectedEvent = null;
          document.body.style.overflow = '';
          render();
          setTimeout(() => {
            document.getElementById('pricing')?.scrollIntoView({behavior: 'smooth'});
          }, 100);
        } else {
          toast(e.message || t('toast.unlockFailed'), 'error');
        }
        return false;
      }
    }

    function openEvent(id) {
      state.selectedEvent = id;
      document.body.style.overflow = 'hidden';
      render();
    }

    function closeEventModal() {
      state.selectedEvent = null;
      document.body.style.overflow = '';
      render();
    }

    function closeAuthModal() {
      state.showAuthModal = false;
      document.body.style.overflow = '';
      render();
    }

    function closePaymentModal() {
      state.showPaymentModal = false;
      document.body.style.overflow = '';
      render();
    }

    function switchAuthMode() {
      state.authMode = state.authMode === 'login' ? 'register' : 'login';
      render();
    }

    function handlePricingClick(tier) {
      if (tier === 'free') {
        state.authMode = 'register';
        state.showAuthModal = true;
      } else {
        state.selectedTier = tier;
        state.showPaymentModal = true;
      }
      document.body.style.overflow = 'hidden';
      render();
    }

    function goRegister() {
      state.showPaymentModal = false;
      state.authMode = 'register';
      state.showAuthModal = true;
      render();
    }

    function handleBottomNav(item) {
      if (item === 'profile') {
        if (state.user) {
          toast(`${state.user.username} · ${state.user.subscription_name}`);
        } else {
          state.authMode = 'login';
          state.showAuthModal = true;
          document.body.style.overflow = 'hidden';
          render();
        }
        return;
      }
      switchTab(item);
    }

    async function createOrder() {
      if (!state.user) return;
      try {
        const order = await api('/subscription/create-order', {
          method: 'POST',
          body: JSON.stringify({ tier: state.selectedTier, payment_method: 'usdt' })
        });
        toast(t('toast.orderCreated2', { orderId: order.order_id }), 'success');
      } catch (e) {
        toast(e.message || t('toast.orderFailed'), 'error');
      }
    }

    // ==================== 初始化 ====================
    async function init() {
      try {
        state.systemConfig = await api('/config');
      } catch (e) {
        console.warn('加载系统配置失败', e);
      }
      await checkAuth();
      await loadData();
      if (state.token && state.alerts.length === 0) {
        loadAlerts();
      }
      
      // 定时刷新
      setInterval(() => {
        if (state.currentTab === 'markets' || state.currentTab === 'analysis') {
          loadData();
        }
      }, 120000);
    }

    init();
  </script>
</body>
